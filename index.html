<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL ORFANATO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
color:#00ff9f;
font-family:Consolas;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* PANEL */
.wrap{
background:rgba(0,0,0,.8);
border:1px solid rgba(0,255,150,.2);
padding:40px;
border-radius:20px;
text-align:center;
width:90%;
max-width:700px;
box-shadow:0 0 40px rgba(0,255,150,.1);
}

/* TITULO */
.title{
font-size:4rem;
font-weight:900;
letter-spacing:6px;
text-shadow:0 0 20px #00ff9f;
animation:glitch 2s infinite;
}

@keyframes glitch{
0%,100%{transform:translate(0)}
20%{transform:translate(2px,-2px)}
40%{transform:translate(-2px,2px)}
60%{transform:translate(2px,1px)}
80%{transform:translate(-2px,-1px)}
}

/* TIMER */
.timer{
display:flex;
justify-content:center;
gap:20px;
margin-top:25px;
font-size:2rem;
font-weight:900;
}

.time{
background:rgba(0,255,150,.08);
padding:20px;
border-radius:15px;
border:1px solid rgba(0,255,150,.2);
}

/* IMG */
.img-box{
margin-top:25px;
border:1px solid rgba(0,255,150,.2);
border-radius:20px;
overflow:hidden;
}

.img-box img{
width:100%;
}

/* AVATAR */
#avatarOverlay{
position:fixed;
inset:0;
background:#000;
display:none;
z-index:9999;
}

#avatarOverlay.active{display:block;}

.avatar{
position:absolute;
bottom:30px;
left:30px;
display:flex;
gap:20px;
}

.avatar img{
width:200px;
}

.bubble{
background:#fff;
color:#000;
padding:15px;
border-radius:20px;
font-weight:bold;
max-width:300px;
}

/* COUNTDOWN POPUP */
#popup{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:#000;
z-index:9998;
}

#popup.active{display:flex;}

.big{
font-size:4rem;
text-shadow:0 0 20px #00ff9f;
}
</style>
</head>

<body>

<div class="wrap">
<h1 class="title">EL ORFANATO</h1>

<div class="timer">
<div class="time" id="h">00</div>
<div class="time" id="m">00</div>
<div class="time" id="s">00</div>
</div>

<div class="img-box">
<img src="assets/imagen.png">
</div>
</div>

<!-- AVATAR -->
<div id="avatarOverlay">
<div class="avatar">
<img id="avatarImg" src="assets/1.png">
<div class="bubble" id="text"></div>
</div>
</div>

<!-- POPUP -->
<div id="popup">
<div class="big" id="popupTime">00:00</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore, doc, getDoc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain: "gorflacos.firebaseapp.com",
  projectId: "gorflacos"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 REFERENCIAS */
const timerRef = doc(db,"global","timer");
const anuncioRef = doc(db,"system","globalAnnouncement");

/* 🔥 TIMER GLOBAL */
let endTime;

async function initTimer(){
const snap = await getDoc(timerRef);

if(snap.exists()){
endTime = snap.data().endTime;
}else{
endTime = Date.now() + (3*60*60*1000);

await setDoc(timerRef,{
endTime:endTime
});
}

startTimer();
}

function startTimer(){
setInterval(()=>{
const t = endTime - Date.now();

if(t<=0){
document.getElementById("h").textContent="00";
document.getElementById("m").textContent="00";
document.getElementById("s").textContent="00";
return;
}

const h=Math.floor(t/1000/60/60);
const m=Math.floor((t/1000/60)%60);
const s=Math.floor((t/1000)%60);

document.getElementById("h").textContent=String(h).padStart(2,"0");
document.getElementById("m").textContent=String(m).padStart(2,"0");
document.getElementById("s").textContent=String(s).padStart(2,"0");

},1000);
}

initTimer();

/* 🔥 ANUNCIOS */
const overlay=document.getElementById("avatarOverlay");
const text=document.getElementById("text");
const avatar=document.getElementById("avatarImg");

onSnapshot(anuncioRef,(snap)=>{
const d=snap.data()||{};

if(d.active){
overlay.classList.add("active");
text.textContent=d.text;
avatar.src="assets/"+(d.avatar||"1.png");
}else{
overlay.classList.remove("active");
}
});

/* 🔥 COUNTDOWN POPUP */
const popup=document.getElementById("popup");
const popupTime=document.getElementById("popupTime");

function startPopup(end){
popup.classList.add("active");

setInterval(()=>{
const t=end-Date.now();

if(t<=0){
popupTime.textContent="00:00";
popup.classList.remove("active");
return;
}

const m=Math.floor(t/1000/60);
const s=Math.floor((t/1000)%60);

popupTime.textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
},1000);
}
</script>

</body>
</html>
