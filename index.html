<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:#000;
}

/* 🔥 FONDO BONITO */
.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.9)),
    url("https://images.unsplash.com/photo-1535223289827-42f1e9919769?q=80&w=1974&auto=format&fit=crop") center/cover;
  z-index:0;
}

/* CONTENIDO */
.wrap{
  z-index:2;
  text-align:center;
  padding:40px;
  border-radius:20px;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.1);
}

/* 🔴 TITULO */
.title{
  font-size:70px;
  font-weight:900;
  color:white;
  letter-spacing:8px;
  position:relative;
}

/* GLITCH FINO */
.title::before,
.title::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
}

.title::before{
  color:red;
  transform:translate(2px,0);
  opacity:.6;
}

.title::after{
  color:white;
  transform:translate(-2px,0);
  opacity:.6;
}

/* BARRA */
.bar{
  margin-top:25px;
  width:320px;
  height:20px;
  background:rgba(255,255,255,.1);
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff0000,#ffffff);
  transition:.4s;
}

.counter{
  margin-top:15px;
  font-size:22px;
  font-weight:bold;
}

/* BOTON */
button{
  margin-top:25px;
  padding:14px 30px;
  border:none;
  border-radius:10px;
  background:#ff0000;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#cc0000;
}

/* ALERTA */
#alert{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.95);
  z-index:999999;
}

#alert.active{
  display:flex;
}

#alertText{
  font-size:60px;
  color:white;
  text-align:center;
  animation:zoom .3s ease;
}

@keyframes zoom{
  from{transform:scale(0.7);}
  to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">
  <h1 class="title" data-text="KODE">KODE</h1>

  <div class="counter" id="counter">0/10</div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <button id="btn">CLICK</button>
  <div id="msg"></div>
</div>

<div id="alert">
  <div id="alertText"></div>
</div>

<!-- FIREBASE V10 -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const META = 10;

const app = initializeApp({
  apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain:"gorflacos.firebaseapp.com",
  projectId:"gorflacos"
});

const db = getFirestore(app);
const ref = doc(db,"progress","kode_main");

const counter = document.getElementById("counter");
const fill = document.getElementById("fill");
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");

const LOCAL="kode_voted";

async function load(){
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{current:0,total:META});
    update(0,META);
  }else{
    const d = snap.data();
    update(d.current||0,META);
    await setDoc(ref,{total:META},{merge:true});
  }

  if(localStorage.getItem(LOCAL)){
    bloquear("Ya votaste.");
  }
}

function update(c,t){
  counter.innerText=c+"/"+t;
  fill.style.width=(c/t*100)+"%";
}

function bloquear(t){
  btn.disabled=true;
  msg.innerText=t;
}

btn.onclick=async ()=>{
  if(localStorage.getItem(LOCAL)){
    bloquear("Acceso bloqueado.");
    return;
  }

  await runTransaction(db,async(t)=>{
    const snap = await t.get(ref);
    let c = snap.data().current||0;

    if(c>=META) return;

    c++;
    t.update(ref,{current:c});
    update(c,META);
  });

  localStorage.setItem(LOCAL,"1");
  bloquear("Voto registrado.");
};

load();
</script>

<!-- ANUNCIOS -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain:"gorflacos.firebaseapp.com",
  projectId:"gorflacos"
});

const db2 = firebase.firestore();

const alertBox = document.getElementById("alert");
const alertText = document.getElementById("alertText");

let last=0;

db2.collection("system").doc("globalAnnouncement")
.onSnapshot(doc=>{
  if(!doc.exists) return;

  const d=doc.data();

  if(!d.active) return;
  if(d.time===last) return;

  last=d.time;

  alertText.innerText=d.text;
  alertBox.classList.add("active");

  setTimeout(()=>{
    alertBox.classList.remove("active");
  },4000);
});
</script>

</body>
</html>
