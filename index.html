<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorflacos Shop</title>

<style>
:root {
  --black:#000;
  --white:#fff;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#fafafa;
}

/* HEADER */
header{
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  border-bottom:2px solid #000;
  position:sticky;
  top:0;
  z-index:100;
}

/* TIENDA */
#store{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:30px;
  padding:40px;
}

.card{
  background:#fff;
  border:2px solid #000;
  border-radius:20px;
  overflow:hidden;
  box-shadow:8px 8px 0 #000;
  cursor:pointer;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* CARRITO */
#cart-panel{
  position:fixed;
  right:20px;
  top:100px;
  width:300px;
  background:#fff;
  border:3px solid #000;
  padding:20px;
  display:none;
  z-index:500;
}

/* 🚨 ANUNCIO */
#globalAlert{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.95);
  z-index:999999;
}

#globalAlert.active{
  display:flex;
}

#globalAlertText{
  font-size:60px;
  background:#fff;
  color:#000;
  padding:30px 40px;
  border-radius:20px;
  border:4px solid #000;
}
</style>
</head>

<body>

<header>
  <div>GORFLACOS SHOP</div>
  <div onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</header>

<div id="store"></div>

<div id="cart-panel">
  <h3>CARRITO</h3>
  <div id="cart-list"></div>
</div>

<!-- 🚨 ANUNCIO -->
<div id="globalAlert">
  <div id="globalAlertText"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain:"gorflacos.firebaseapp.com",
  projectId:"gorflacos"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* VARIABLES */
let cart=[];
const store=document.getElementById("store");
const cartList=document.getElementById("cart-list");
const count=document.getElementById("count");

/* TIENDA */
db.collection("productos").onSnapshot(snapshot=>{
  store.innerHTML="";

  snapshot.forEach(doc=>{
    const p=doc.data();

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.imagen}">
      <div style="padding:10px;text-align:center">
        <h3>${p.nombre}</h3>
        <p>$${p.precio}</p>
      </div>
    `;

    card.onclick=()=>addCart(p);

    store.appendChild(card);
  });
});

/* CARRITO */
function addCart(p){
  cart.push(p);
  count.innerText=cart.length;
  renderCart();
}

function renderCart(){
  cartList.innerHTML="";
  cart.forEach(p=>{
    const div=document.createElement("div");
    div.innerText=p.nombre+" - $"+p.precio;
    cartList.appendChild(div);
  });
}

function toggleCart(){
  const panel=document.getElementById("cart-panel");
  panel.style.display=panel.style.display==="block"?"none":"block";
}

/* 🚨 ANUNCIOS TIEMPO REAL */
const alertBox=document.getElementById("globalAlert");
const alertText=document.getElementById("globalAlertText");

db.collection("system").doc("globalAnnouncement")
.onSnapshot(doc=>{
  if(!doc.exists){
    alertBox.classList.remove("active");
    return;
  }

  const d=doc.data();

  if(d.active && d.text){
    alertText.innerText=d.text;
    alertBox.classList.add("active");
  }else{
    alertBox.classList.remove("active");
  }
});
</script>

</body>
</html>
