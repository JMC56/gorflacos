<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:white;
  font-family:Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* CONTENEDOR */
.wrap{
  text-align:center;
  background:rgba(0,0,0,.5);
  padding:40px;
  border-radius:20px;
}

/* TITULO */
.title{
  font-size:60px;
  letter-spacing:5px;
}

/* BARRA */
.bar{
  margin-top:20px;
  width:300px;
  height:20px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:white;
  transition:.4s;
}

.counter{
  margin-top:10px;
  font-size:20px;
}

button{
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* 🚨 ALERTA LIMPIA */
#alert{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.95);
  z-index:999999;
}

#alert.active{
  display:flex;
  animation:fadeIn .4s ease;
}

#alertText{
  font-size:55px;
  text-align:center;
  animation:zoomIn .4s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes zoomIn{
  from{transform:scale(0.8);}
  to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="wrap">
  <h1 class="title">KODE</h1>

  <div class="counter" id="counter">0/10</div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <button id="btn">CLICK</button>
  <div id="msg"></div>
</div>

<!-- ALERTA -->
<div id="alert">
  <div id="alertText"></div>
</div>

<!-- FIREBASE V10 -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const config={
  apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain:"gorflacos.firebaseapp.com",
  projectId:"gorflacos"
};

const app=initializeApp(config);
const db=getFirestore(app);

const ref=doc(db,"progress","kode_main");

const counter=document.getElementById("counter");
const fill=document.getElementById("fill");
const btn=document.getElementById("btn");
const msg=document.getElementById("msg");

const LOCAL="kode_voted";

// CARGAR
async function load(){
  const snap=await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{current:0,total:10});
    update(0,10);
  }else{
    const d=snap.data();
    update(d.current||0,d.total||10);
  }

  if(localStorage.getItem(LOCAL)){
    bloquear("Ya votaste desde este dispositivo.");
  }
}

function update(c,t){
  counter.innerText=c+"/"+t;
  fill.style.width=(c/t*100)+"%";
}

function bloquear(text){
  btn.disabled=true;
  msg.innerText=text;
}

// CLICK
btn.onclick=async ()=>{
  if(localStorage.getItem(LOCAL)){
    bloquear("Acceso bloqueado.");
    return;
  }

  await runTransaction(db,async(t)=>{
    const snap=await t.get(ref);
    const d=snap.data();

    let c=d.current||0;
    let total=d.total||10;

    if(c>=total) return;

    c++;

    t.update(ref,{current:c});
    update(c,total);
  });

  localStorage.setItem(LOCAL,"1");
  bloquear("Voto registrado.");
};

load();
</script>

<!-- FIREBASE V8 (ANUNCIOS) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
if(!firebase.apps.length){
  firebase.initializeApp({
    apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
    authDomain:"gorflacos.firebaseapp.com",
    projectId:"gorflacos"
  });
}

const db2=firebase.firestore();

const alertBox=document.getElementById("alert");
const alertText=document.getElementById("alertText");

let lastTime=0;

// ANUNCIOS LIMPIOS
db2.collection("system").doc("globalAnnouncement")
.onSnapshot(doc=>{
  if(!doc.exists) return;

  const d=doc.data();

  if(!d.active) return;

  // evita repetición
  if(d.time === lastTime) return;

  lastTime = d.time;

  mostrar(d.text);
});

function mostrar(text){
  alertText.innerText=text;
  alertBox.classList.add("active");

  setTimeout(()=>{
    alertBox.classList.remove("active");
  },4000);
}
</script>

</body>
</html>
