<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>System</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  overflow:hidden;
}

/* VIDEO */
video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.3;
}

/* ALERTA */
#alert{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:black;
  z-index:999999;
}

/* TEXTO */
#txt{
  font-size:60px;
  text-align:center;
  animation:shake 0.1s infinite;
}

/* GLITCH */
#txt::before,
#txt::after{
  content:attr(data-text);
  position:absolute;
  left:0;
}

#txt::before{
  color:red;
  animation:glitch1 0.1s infinite;
}

#txt::after{
  color:blue;
  animation:glitch2 0.1s infinite;
}

@keyframes glitch1{
  0%{transform:translate(2px,-2px);}
  50%{transform:translate(-2px,2px);}
}

@keyframes glitch2{
  0%{transform:translate(-2px,2px);}
  50%{transform:translate(2px,-2px);}
}

@keyframes shake{
  0%{transform:translate(0,0);}
  50%{transform:translate(2px,-2px);}
}

/* FLASH */
.flash{
  animation:flash 0.2s infinite;
}

@keyframes flash{
  0%{background:black;}
  50%{background:#020202;}
}
</style>
</head>

<body>

<video id="cam" autoplay muted playsinline></video>

<div id="alert">
  <div id="txt"></div>
</div>

<!-- SONIDO -->
<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig={
  apiKey:"TU_API_KEY",
  authDomain:"TU_AUTH_DOMAIN",
  projectId:"TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// CAMARA
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>cam.srcObject=s);

// ELEMENTOS
const alertBox=document.getElementById("alert");
const txt=document.getElementById("txt");
const alarm=document.getElementById("alarm");

// ESCUCHAR ANUNCIOS
db.collection("global_alert").doc("current")
.onSnapshot(doc=>{
  if(!doc.exists)return;
  const data=doc.data();
  if(!data.text)return;

  activar(data.text);
});

// ACTIVAR MODO TERROR
function activar(texto){
  alertBox.style.display="flex";
  document.body.classList.add("flash");

  alarm.play();

  let i=0;
  const interval=setInterval(()=>{
    txt.innerText=corrupt(texto);
    txt.setAttribute("data-text",txt.innerText);
    i++;

    if(i>30){
      clearInterval(interval);
      alertBox.style.display="none";
      document.body.classList.remove("flash");
    }
  },100);
}

// TEXTO CORROMPIDO EXTREMO
function corrupt(t){
  const c="█▓▒@#%&$!?/<>[]{}";
  return t.split("").map(l=>{
    return Math.random()>0.5
      ? c[Math.floor(Math.random()*c.length)]
      : l;
  }).join("");
}
</script>

</body>
</html>
