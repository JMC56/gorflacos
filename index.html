<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  font-family:Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  overflow:hidden;
}

/* FONDO */
.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
    url('https://www.hollywoodreporter.com/wp-content/uploads/2024/07/21rep5.jpg?w=1850') center/cover;
  z-index:0;
}

/* CONTENIDO */
.wrap{
  z-index:2;
  text-align:center;
  background:rgba(0,0,0,.4);
  padding:40px;
  border-radius:20px;
}

.title{
  font-size:60px;
  color:white;
}

.counter{
  margin-top:20px;
  font-size:25px;
}

.bar{
  margin-top:10px;
  height:20px;
  background:#333;
  border-radius:10px;
}

.fill{
  height:100%;
  width:0%;
  background:white;
}

button{
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:10px;
}

/* 🚨 ALERTA HACKER */
#alert{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:black;
  z-index:999999;
}

#alert.active{
  display:flex;
  animation:flash 0.2s infinite;
}

#alertText{
  font-size:60px;
  color:#00ff00;
  font-family:monospace;
  text-align:center;
  animation:shake 0.08s infinite;
}

@keyframes shake{
  0%{transform:translate(2px,0);}
  50%{transform:translate(-2px,0);}
  100%{transform:translate(2px,0);}
}

@keyframes flash{
  0%{background:black;}
  50%{background:#020202;}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">
  <h1 class="title">KODE</h1>

  <div class="counter" id="counter">0/100</div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <button id="btn">CLICK</button>
</div>

<!-- 🚨 ALERTA -->
<div id="alert">
  <div id="alertText"></div>
</div>

<!-- FIREBASE V10 (PROGRESO) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const config={
  apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain:"gorflacos.firebaseapp.com",
  projectId:"gorflacos"
};

const app=initializeApp(config);
const db=getFirestore(app);

const counter=document.getElementById("counter");
const fill=document.getElementById("fill");
const btn=document.getElementById("btn");

const ref=doc(db,"progress","kode_main");
const TOTAL=100;

async function load(){
  const snap=await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{current:0});
    update(0);
  }else{
    update(snap.data().current||0);
  }
}

function update(v){
  counter.innerText=v+"/"+TOTAL;
  fill.style.width=(v/TOTAL*100)+"%";
}

btn.onclick=async ()=>{
  await runTransaction(db,async(t)=>{
    const snap=await t.get(ref);
    let v=snap.exists()?snap.data().current:0;
    v++;
    t.set(ref,{current:v});
    update(v);
  });
};

load();
</script>

<!-- FIREBASE V8 (ANUNCIOS) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
if(!firebase.apps.length){
  firebase.initializeApp({
    apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
    authDomain:"gorflacos.firebaseapp.com",
    projectId:"gorflacos"
  });
}

const db2=firebase.firestore();

const alertBox=document.getElementById("alert");
const alertText=document.getElementById("alertText");

let loop=null;

// ESCUCHAR ANUNCIOS
db2.collection("system").doc("globalAnnouncement")
.onSnapshot(doc=>{
  if(!doc.exists)return;

  const d=doc.data();

  if(d.active && d.text){
    activar(d.text);
  }else{
    desactivar();
  }
});

function activar(text){
  alertBox.classList.add("active");

  loop=setInterval(()=>{
    alertText.innerText=corrupt(text.toUpperCase());
  },80);
}

function desactivar(){
  alertBox.classList.remove("active");
  clearInterval(loop);
}

function corrupt(t){
  const c="█▓▒@#%&/<>[]{}$";
  return t.split("").map(l=>{
    return Math.random()>0.6
      ? c[Math.floor(Math.random()*c.length)]
      : l;
  }).join("");
}
</script>

</body>
</html>
