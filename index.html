<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  color:white;
  font-family:monospace;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

/* 🔥 FONDO HACKER */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.95)),
    repeating-linear-gradient(
      0deg,
      rgba(0,255,0,.05) 0px,
      transparent 2px,
      transparent 4px
    );
  animation:scan 6s linear infinite;
  z-index:0;
}

@keyframes scan{
  from{background-position:0 0;}
  to{background-position:0 100px;}
}

/* CONTENEDOR */
.wrap{
  z-index:2;
  text-align:center;
  background:rgba(0,0,0,.5);
  padding:40px;
  border-radius:20px;
}

/* 🔴 TITULO GLITCH */
.title{
  font-size:60px;
  position:relative;
  display:inline-block;
  letter-spacing:6px;
}

.title::before,
.title::after{
  content:attr(data-text);
  position:absolute;
  left:0;
}

.title::before{
  color:red;
  animation:gl1 .6s infinite;
}

.title::after{
  color:cyan;
  animation:gl2 .6s infinite;
}

@keyframes gl1{
  0%{transform:translate(2px,-2px);}
  50%{transform:translate(-2px,2px);}
}

@keyframes gl2{
  0%{transform:translate(-2px,2px);}
  50%{transform:translate(2px,-2px);}
}

/* BARRA */
.bar{
  margin-top:20px;
  width:300px;
  height:20px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:#00ff00;
  transition:.4s;
}

.counter{
  margin-top:10px;
}

button{
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#00ff00;
  color:black;
}

/* ALERTA */
#alert{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.95);
  z-index:999999;
}

#alert.active{
  display:flex;
}

#alertText{
  font-size:55px;
}
</style>
</head>

<body>

<div class="wrap">
  <h1 class="title" data-text="KODE">KODE</h1>

  <div class="counter" id="counter">0/10</div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <button id="btn">CLICK</button>
  <div id="msg"></div>
</div>

<div id="alert">
  <div id="alertText"></div>
</div>

<!-- FIREBASE V10 -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const META = 10; // 🔥 CAMBIA AQUÍ

const config={
  apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain:"gorflacos.firebaseapp.com",
  projectId:"gorflacos"
};

const app=initializeApp(config);
const db=getFirestore(app);

const ref=doc(db,"progress","kode_main");

const counter=document.getElementById("counter");
const fill=document.getElementById("fill");
const btn=document.getElementById("btn");
const msg=document.getElementById("msg");

const LOCAL="kode_voted";

// CARGAR
async function load(){
  const snap=await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{current:0,total:META});
    update(0,META);
  }else{
    const d=snap.data();
    update(d.current||0,META);

    // fuerza actualización de meta
    await setDoc(ref,{total:META},{merge:true});
  }

  if(localStorage.getItem(LOCAL)){
    bloquear("Ya votaste desde este dispositivo.");
  }
}

function update(c,t){
  counter.innerText=c+"/"+t;
  fill.style.width=(c/t*100)+"%";
}

function bloquear(text){
  btn.disabled=true;
  msg.innerText=text;
}

// CLICK
btn.onclick=async ()=>{
  if(localStorage.getItem(LOCAL)){
    bloquear("Acceso bloqueado.");
    return;
  }

  await runTransaction(db,async(t)=>{
    const snap=await t.get(ref);
    const d=snap.data();

    let c=d.current||0;

    if(c>=META) return;

    c++;

    t.update(ref,{current:c});
    update(c,META);
  });

  localStorage.setItem(LOCAL,"1");
  bloquear("Voto registrado.");
};

load();
</script>

<!-- ANUNCIOS -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
if(!firebase.apps.length){
  firebase.initializeApp({
    apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
    authDomain:"gorflacos.firebaseapp.com",
    projectId:"gorflacos"
  });
}

const db2=firebase.firestore();

const alertBox=document.getElementById("alert");
const alertText=document.getElementById("alertText");

let lastTime=0;

db2.collection("system").doc("globalAnnouncement")
.onSnapshot(doc=>{
  if(!doc.exists) return;

  const d=doc.data();

  if(!d.active) return;

  if(d.time === lastTime) return;

  lastTime = d.time;

  alertText.innerText=d.text;
  alertBox.classList.add("active");

  setTimeout(()=>{
    alertBox.classList.remove("active");
  },4000);
});
</script>

</body>
</html>
