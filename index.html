<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gorflacos Shop</title>
    <style>
        :root { --black: #000; --white: #fff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 100; }
        #store { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; padding: 40px; }
        .card { background: white; border: 2px solid #000; border-radius: 20px; overflow: hidden; box-shadow: 8px 8px 0px #000; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px #000; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid #000; }
        .card-info { padding: 15px; text-align: center; }
        .no-stock { filter: grayscale(1); opacity: 0.5; }
        .lock { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.6); font-size: 3rem; font-weight: 900; color: #000; }
        
        #cart-panel { position: fixed; right: 20px; top: 100px; width: 300px; background: white; border: 3px solid #000; border-radius: 15px; padding: 20px; box-shadow: 10px 10px 0px #000; display: none; z-index: 500; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .m-box { background: white; padding: 30px; border-radius: 20px; border: 4px solid #000; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #000; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #000; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <a href="login.html" style="text-decoration:none; color:#000; font-weight:bold; border:2px solid #000; padding:5px 10px; border-radius:8px;">LOGIN</a>
        <div onclick="document.getElementById('cart-panel').style.display='block'" style="cursor:pointer; font-weight:bold;">🛒 CARRITO (<span id="count">0</span>)</div>
    </header>

    <div id="store"></div>

    <div id="cart-panel">
        <h3>TU PEDIDO</h3>
        <div id="cart-list"></div>
        <hr border="1">
        <button class="btn" onclick="openM()">COMPRAR</button>
        <button onclick="this.parentElement.style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer;">Cerrar</button>
    </div>

    <div id="modal-buy" class="modal">
        <div class="m-box">
            <h2 id="m-title">FINALIZAR</h2>
            <div id="m-form">
                <input type="text" id="user-n" placeholder="Tu Nombre">
                <input type="text" id="user-g" placeholder="Tu Grado">
                <button class="btn" onclick="confirmarCompra()">CONFIRMAR</button>
            </div>
            <div id="m-thanks" style="display:none">
                <p>¡Gracias por tu compra!</p>
                <p>Se te entregará lo más pronto posible.</p>
                <button class="btn" onclick="location.reload()">CERRAR</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
            authDomain: "gorflacos.firebaseapp.com",
            projectId: "gorflacos",
            storageBucket: "gorflacos.firebasestorage.app",
            messagingSenderId: "507648872448",
            appId: "1:507648872448:web:72dae319bcde4cea4e08e5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let cart = [];

        db.collection("productos").onSnapshot(snap => {
            const container = document.getElementById('store');
            container.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                const out = p.stock <= 0;
                container.innerHTML += `
                    <div class="card ${out?'no-stock':''}" onclick="${out?'':'add(\''+doc.id+'\',\''+p.nombre+'\','+p.precio+','+p.stock+')'}">
                        <img src="${p.imagen}">
                        <div class="card-info">
                            <h3>${p.nombre}</h3>
                            <p>$${p.precio}</p>
                            <small>Stock: ${p.stock}</small>
                        </div>
                        ${out?'<div class="lock">🔒 SIN STOCK</div>':''}
                    </div>
                `;
            });
        });

        function add(id, n, p, s) {
            const item = cart.find(x => x.id === id);
            if(item) {
                if(item.qty < s) item.qty++;
                else alert("Sin más stock");
            } else { cart.push({id, n, p, qty: 1, s}); }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            cart.forEach((i, idx) => {
                list.innerHTML += `<p>${i.n} x${i.qty} - $${i.p*i.qty} <button onclick="cart.splice(${idx},1);renderCart()">x</button></p>`;
            });
            document.getElementById('count').innerText = cart.length;
        }

        function openM() { if(cart.length>0) document.getElementById('modal-buy').style.display='flex'; }

        async function confirmarCompra() {
            const name = document.getElementById('user-n').value;
            const grade = document.getElementById('user-g').value;
            if(!name || !grade) return alert("Completa los datos");

            const batch = db.batch();
            const itemsTxt = cart.map(x => `${x.n} (x${x.qty})`).join(", ");
            const total = cart.reduce((a,b) => a + (b.p*b.qty), 0);

            const vRef = db.collection("compras").doc();
            batch.set(vRef, { cliente: name, grado: grade, pedido: itemsTxt, total: total, fecha: new Date().toLocaleString() });

            cart.forEach(x => {
                const pRef = db.collection("productos").doc(x.id);
                batch.update(pRef, { stock: firebase.firestore.FieldValue.increment(-x.qty) });
            });

            await batch.commit();
            document.getElementById('m-form').style.display='none';
            document.getElementById('m-thanks').style.display='block';
        }
    </script>
</body>
</html>
