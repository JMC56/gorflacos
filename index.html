<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Shop | Gorflacos</title>
    <style>
        :root { --black: #000; --white: #fff; --dot: #d1d1d1; }
        body { 
            margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--white);
            background-image: radial-gradient(var(--dot) 1px, transparent 1px); background-size: 20px 20px;
        }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
        .btn-log { text-decoration: none; color: var(--black); font-weight: 800; border: 2px solid var(--black); padding: 8px 16px; border-radius: 10px; transition: 0.2s; }
        .btn-log:hover { background: var(--black); color: var(--white); }

        #store { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; padding: 40px; }
        .card { 
            background: var(--white); border-radius: 20px; overflow: hidden; border: 1px solid #eee;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); border-color: var(--black); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .card-info h3 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .card-info p { margin: 10px 0 0; font-weight: 900; font-size: 1.3rem; }

        .no-stock { filter: grayscale(1); opacity: 0.6; }
        .lock-badge { position: absolute; inset: 0; background: rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 3rem; flex-direction: column; color: #000; font-weight: 900; }

        #cart-panel { position: fixed; right: 20px; top: 90px; width: 320px; background: var(--white); border: 3px solid var(--black); border-radius: 20px; padding: 20px; box-shadow: 12px 12px 0px var(--black); display: none; z-index: 1000; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: var(--white); padding: 40px; border-radius: 25px; width: 380px; text-align: center; border: 4px solid #000; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #000; border-radius: 12px; font-size: 1rem; }
        .btn-black { background: var(--black); color: var(--white); border: none; padding: 15px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

    <header>
        <a href="login.html" class="btn-log">LOGIN ADMIN</a>
        <div onclick="toggleCart()" style="cursor:pointer; font-weight: 900; font-size: 1.2rem;">
            🛒 CARRITO (<span id="cart-count">0</span>)
        </div>
    </header>

    <div id="store"></div>

    <div id="cart-panel">
        <h2 style="margin-top:0">TU PEDIDO</h2>
        <div id="cart-items" style="max-height: 300px; overflow-y: auto;"></div>
        <hr style="border: 1px dashed #000; margin: 20px 0;">
        <button class="btn-black" onclick="openCheckout()">COMPRAR AHORA</button>
        <button onclick="toggleCart()" style="background:none; border:none; width:100%; margin-top:10px; cursor:pointer; font-weight:bold;">Cerrar</button>
    </div>

    <div id="modal-checkout" class="modal">
        <div class="modal-box">
            <h2 id="m-title">DATOS DE ENTREGA</h2>
            <div id="f-datos">
                <input type="text" id="c-name" placeholder="Escribe tu Nombre">
                <input type="text" id="c-grade" placeholder="Grado (Ej: 11mo A)">
                <button class="btn-black" onclick="processPurchase()">CONFIRMAR PEDIDO</button>
            </div>
            <div id="m-success" style="display:none">
                <p style="font-size: 1.2rem; font-weight: bold;">¡PEDIDO RECIBIDO! 🍬</p>
                <p>Alguien te entregará el producto lo más pronto posible.</p>
                <button class="btn-black" onclick="location.reload()">VOLVER A LA TIENDA</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
            authDomain: "gorflacos.firebaseapp.com",
            projectId: "gorflacos",
            storageBucket: "gorflacos.firebasestorage.app",
            messagingSenderId: "507648872448",
            appId: "1:507648872448:web:72dae319bcde4cea4e08e5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = [];

        db.collection("productos").onSnapshot(snap => {
            const store = document.getElementById('store');
            store.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                const isOut = p.stock <= 0;
                store.innerHTML += `
                    <div class="card ${isOut ? 'no-stock' : ''}" onclick="${isOut ? '' : `addToCart('${doc.id}', '${p.nombre}', ${p.precio}, ${p.stock})`}">
                        <img src="${p.imagen}">
                        <div class="card-info">
                            <h3>${p.nombre}</h3>
                            <p>$${p.precio}</p>
                            <small>Stock: ${p.stock}</small>
                        </div>
                        ${isOut ? '<div class="lock-badge">🔒<br><span style="font-size:1rem">SIN STOCK</span></div>' : ''}
                    </div>
                `;
            });
        });

        function addToCart(id, nombre, precio, stock) {
            const item = cart.find(i => i.id === id);
            if(item) {
                if(item.qty < stock) item.qty++;
                else alert("No hay más unidades en stock");
            } else {
                cart.push({id, nombre, precio, qty: 1, stock});
            }
            updateCartUI();
            document.getElementById('cart-panel').style.display = 'block';
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            cart.forEach((i, idx) => {
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-weight:bold;">
                        <span>${i.nombre} (x${i.qty})</span>
                        <span>$${i.precio * i.qty}</span>
                        <button onclick="cart.splice(${idx},1); updateCartUI()" style="background:red; color:white; border:none; border-radius:5px; cursor:pointer;">X</button>
                    </div>
                `;
            });
            document.getElementById('cart-count').innerText = cart.length;
        }

        function toggleCart() {
            const p = document.getElementById('cart-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function openCheckout() {
            if(cart.length === 0) return alert("Carrito vacío");
            document.getElementById('modal-checkout').style.display = 'flex';
        }

        async function processPurchase() {
            const n = document.getElementById('c-name').value;
            const g = document.getElementById('c-grade').value;
            if(!n || !g) return alert("Llena tus datos para la entrega");

            const batch = db.batch();
            const resumen = cart.map(i => `${i.nombre} (x${i.qty})`).join(', ');
            const total = cart.reduce((acc, i) => acc + (i.precio * i.qty), 0);

            const orderRef = db.collection("compras").doc();
            batch.set(orderRef, {
                cliente: n,
                grado: g,
                pedido: resumen,
                total: total,
                fecha: new Date().toLocaleString()
            });

            cart.forEach(i => {
                const pRef = db.collection("productos").doc(i.id);
                batch.update(pRef, { stock: firebase.firestore.FieldValue.increment(-i.qty) });
            });

            await batch.commit();
            document.getElementById('f-datos').style.display = 'none';
            document.getElementById('m-success').style.display = 'block';
            document.getElementById('m-title').innerText = "¡LISTO!";
        }
    </script>
</body>
</html>
