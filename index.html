<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL ORFANATO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --verde:#00ff9f;
  --verde2:#9fffd8;
  --fondo:#000;
  --panel:rgba(0,0,0,.82);
  --borde:rgba(0,255,159,.25);
  --brillo:0 0 20px rgba(0,255,159,.22);
}

html,body{
  width:100%;
  min-height:100%;
}

body{
  background:
    radial-gradient(circle at center, rgba(0,255,159,.08), transparent 45%),
    linear-gradient(rgba(0,255,159,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,159,.03) 1px, transparent 1px),
    #000;
  background-size:cover, 100% 3px, 3px 100%, cover;
  color:var(--verde);
  font-family:Consolas, monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.025) 0px,
      rgba(255,255,255,.025) 1px,
      transparent 2px,
      transparent 4px
    );
  mix-blend-mode:screen;
  opacity:.18;
  animation:scan 8s linear infinite;
}

@keyframes scan{
  0%{transform:translateY(-12px)}
  100%{transform:translateY(12px)}
}

.wrap{
  position:relative;
  z-index:2;
  background:var(--panel);
  border:1px solid var(--borde);
  padding:40px;
  border-radius:22px;
  text-align:center;
  width:90%;
  max-width:760px;
  box-shadow:
    0 0 40px rgba(0,255,159,.10),
    inset 0 0 20px rgba(0,255,159,.03);
  backdrop-filter:blur(8px);
}

.title{
  font-size:clamp(2.6rem, 8vw, 4.8rem);
  font-weight:900;
  letter-spacing:6px;
  text-shadow:
    0 0 10px rgba(0,255,159,.8),
    0 0 24px rgba(0,255,159,.35);
  animation:glitch 2s infinite;
}

@keyframes glitch{
  0%,100%{transform:translate(0)}
  20%{transform:translate(2px,-2px)}
  40%{transform:translate(-2px,2px)}
  60%{transform:translate(2px,1px)}
  80%{transform:translate(-2px,-1px)}
}

.sub{
  margin-top:10px;
  color:var(--verde2);
  opacity:.92;
  font-size:.95rem;
  letter-spacing:1px;
}

.timer{
  display:flex;
  justify-content:center;
  gap:16px;
  margin-top:28px;
  flex-wrap:wrap;
}

.time{
  min-width:110px;
  background:rgba(0,255,159,.07);
  padding:18px 16px;
  border-radius:16px;
  border:1px solid rgba(0,255,159,.22);
  box-shadow:var(--brillo);
}

.num{
  font-size:2.1rem;
  font-weight:900;
  line-height:1;
}

.lab{
  margin-top:8px;
  font-size:.78rem;
  letter-spacing:2px;
  color:var(--verde2);
}

.img-box{
  margin-top:28px;
  border:1px solid rgba(0,255,159,.2);
  border-radius:20px;
  overflow:hidden;
  position:relative;
  background:#020202;
}

.img-box img{
  width:100%;
  display:block;
  max-height:420px;
  object-fit:cover;
  filter:brightness(.82) contrast(1.08);
}

.input-area{
  position:absolute;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  width:min(85%, 340px);
}

#secretInput{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid rgba(0,255,159,.35);
  background:rgba(0,0,0,.82);
  color:var(--verde);
  text-align:center;
  font-size:1.15rem;
  font-weight:900;
  letter-spacing:2px;
  outline:none;
  box-shadow:0 0 18px rgba(0,255,159,.12);
  text-transform:none;
}

#secretInput::placeholder{
  color:rgba(159,255,216,.65);
  letter-spacing:1px;
}

#secretBtn{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(180deg, #00ff9f, #00b96f);
  color:#00140c;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 20px rgba(0,255,159,.22);
}

#secretBtn:hover{
  transform:translateY(-1px);
}

#inputMsg{
  min-height:22px;
  font-weight:900;
  font-size:.95rem;
  text-shadow:0 0 10px rgba(0,255,159,.28);
}

#inputMsg.ok{
  color:#b6ffd9;
}

#inputMsg.bad{
  color:#ff6b6b;
  text-shadow:0 0 12px rgba(255,0,0,.28);
}

.status{
  margin-top:18px;
  min-height:22px;
  color:var(--verde2);
  font-size:.9rem;
  opacity:.9;
}

/* AVATAR */
#avatarOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  z-index:9999;
}

#avatarOverlay.active{
  display:block;
}

.avatar{
  position:absolute;
  bottom:30px;
  left:30px;
  display:flex;
  gap:20px;
  align-items:flex-end;
}

.avatar img{
  width:220px;
  max-width:38vw;
  image-rendering:pixelated;
  filter:drop-shadow(0 14px 24px rgba(0,0,0,.55));
}

.bubble{
  background:#fff;
  color:#000;
  padding:16px 18px;
  border-radius:22px;
  font-weight:bold;
  max-width:320px;
  box-shadow:0 12px 24px rgba(0,0,0,.28);
}

/* POPUP */
#popup{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.92);
  z-index:9998;
}

#popup.active{
  display:flex;
}

.big{
  font-size:clamp(2.2rem, 7vw, 4.5rem);
  text-shadow:
    0 0 10px rgba(0,255,159,.8),
    0 0 24px rgba(0,255,159,.35);
  text-align:center;
  padding:20px;
}

/* MENSAJE FINAL GLOBAL */
#finalOverlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.94);
  z-index:10000;
  padding:20px;
}

#finalOverlay.active{
  display:flex;
}

.final-box{
  text-align:center;
  max-width:760px;
  padding:34px 24px;
  border:1px solid rgba(0,255,159,.28);
  border-radius:24px;
  background:rgba(0,0,0,.84);
  box-shadow:0 0 40px rgba(0,255,159,.12);
}

.final-title{
  font-size:clamp(2rem, 6vw, 4.2rem);
  font-weight:900;
  color:#d6ffec;
  letter-spacing:3px;
  text-shadow:
    0 0 12px rgba(0,255,159,.8),
    0 0 28px rgba(0,255,159,.28);
}

.final-sub{
  margin-top:14px;
  font-size:1.05rem;
  color:var(--verde2);
}

.hidden{
  display:none !important;
}

@media (max-width:700px){
  .wrap{
    padding:24px 14px;
  }

  .timer{
    gap:10px;
  }

  .time{
    min-width:88px;
    padding:16px 10px;
  }

  .num{
    font-size:1.7rem;
  }

  .avatar{
    left:14px;
    right:14px;
    bottom:14px;
    gap:12px;
  }

  .avatar img{
    width:120px;
    max-width:none;
  }

  .bubble{
    max-width:calc(100vw - 170px);
    font-size:.92rem;
    padding:12px 14px;
  }

  .input-area{
    width:min(92%, 320px);
    bottom:14px;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <h1 class="title">EL ORFANATO</h1>
  <div class="sub">Temporizador global activo</div>

  <div class="timer" id="timerBox">
    <div class="time">
      <div class="num" id="h">00</div>
      <div class="lab">HORAS</div>
    </div>
    <div class="time">
      <div class="num" id="m">00</div>
      <div class="lab">MINUTOS</div>
    </div>
    <div class="time">
      <div class="num" id="s">00</div>
      <div class="lab">SEGUNDOS</div>
    </div>
  </div>

  <div class="img-box">
    <img src="assets/imagen.png" alt="Imagen principal">

    <div class="input-area" id="inputArea">
      <input id="secretInput" type="text" maxlength="4" placeholder="ESCRIBE LA PALABRA">
      <button id="secretBtn" type="button">ENVIAR</button>
      <div id="inputMsg"></div>
    </div>
  </div>

  <div class="status" id="status">Conectando con el sistema global...</div>
</div>

<!-- AVATAR -->
<div id="avatarOverlay">
  <div class="avatar">
    <img id="avatarImg" src="assets/1.png" alt="Avatar">
    <div class="bubble" id="text"></div>
  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="big" id="popupTime">00:00</div>
</div>

<!-- FINAL -->
<div id="finalOverlay">
  <div class="final-box">
    <div class="final-title">FELICIDADES</div>
    <div class="final-sub">LO HAN ENCONTRADO</div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain: "gorflacos.firebaseapp.com",
  projectId: "gorflacos"
};

const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const db = getFirestore(app);

/* REFERENCIAS */
const timerRef = doc(db, "global", "timer");
const anuncioRef = doc(db, "system", "globalAnnouncement");

/* ELEMENTOS */
const hEl = document.getElementById("h");
const mEl = document.getElementById("m");
const sEl = document.getElementById("s");
const statusEl = document.getElementById("status");

const overlay = document.getElementById("avatarOverlay");
const text = document.getElementById("text");
const avatar = document.getElementById("avatarImg");

const popup = document.getElementById("popup");
const popupTime = document.getElementById("popupTime");

const finalOverlay = document.getElementById("finalOverlay");
const inputArea = document.getElementById("inputArea");
const secretInput = document.getElementById("secretInput");
const secretBtn = document.getElementById("secretBtn");
const inputMsg = document.getElementById("inputMsg");

/* TIMER GLOBAL */
let timerInterval = null;
let popupInterval = null;
let currentEndTime = null;
let alreadyFound = false;

function format(n){
  return String(n).padStart(2, "0");
}

function stopMainTimer(){
  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function renderZeros(){
  hEl.textContent = "00";
  mEl.textContent = "00";
  sEl.textContent = "00";
}

function startTimerLoop(){
  stopMainTimer();

  const tick = () => {
    if(alreadyFound){
      renderZeros();
      return;
    }

    const t = Number(currentEndTime || 0) - Date.now();

    if(t <= 0){
      renderZeros();
      return;
    }

    const h = Math.floor(t / 1000 / 60 / 60);
    const m = Math.floor((t / 1000 / 60) % 60);
    const s = Math.floor((t / 1000) % 60);

    hEl.textContent = format(h);
    mEl.textContent = format(m);
    sEl.textContent = format(s);
  };

  tick();
  timerInterval = setInterval(tick, 1000);
}

async function initTimer(){
  try{
    const snap = await getDoc(timerRef);

    if(snap.exists()){
      const data = snap.data() || {};
      currentEndTime = data.endTime || (Date.now() + (3 * 60 * 60 * 1000));
      alreadyFound = data.found === true;
    }else{
      currentEndTime = Date.now() + (3 * 60 * 60 * 1000);

      await setDoc(timerRef, {
        endTime: currentEndTime,
        found: false,
        foundMessage: "",
        foundAt: null,
        createdAt: Date.now()
      });
    }

    if(alreadyFound){
      renderFoundState();
    }else{
      startTimerLoop();
      statusEl.textContent = "Temporizador global cargado.";
    }
  }catch(error){
    console.error("Error initTimer:", error);
    statusEl.textContent = "Error al conectar con Firebase.";
  }
}

function renderFoundState(){
  alreadyFound = true;
  stopMainTimer();
  renderZeros();
  inputArea.classList.add("hidden");
  finalOverlay.classList.add("active");
  statusEl.textContent = "El código ya fue encontrado.";
}

function renderNotFoundState(){
  alreadyFound = false;
  finalOverlay.classList.remove("active");
  inputArea.classList.remove("hidden");
  startTimerLoop();
}

onSnapshot(timerRef, (snap) => {
  const data = snap.data() || {};

  currentEndTime = data.endTime || currentEndTime;
  const found = data.found === true;

  if(found){
    renderFoundState();
  }else{
    if(alreadyFound){
      finalOverlay.classList.remove("active");
    }
    renderNotFoundState();
    statusEl.textContent = "Temporizador global sincronizado.";
  }
}, (err) => {
  console.error("Error escuchando timer:", err);
});

/* INPUT SECRETO */
function setInputMessage(message, ok = false){
  inputMsg.textContent = message;
  inputMsg.className = ok ? "ok" : "bad";
}

async function trySecret(){
  if(alreadyFound){
    setInputMessage("YA FUE ENCONTRADO", true);
    return;
  }

  const value = (secretInput.value || "").trim();

  if(value === "BOLO"){
    try{
      await updateDoc(timerRef, {
        found: true,
        foundMessage: "FELICIDADES LO HAN ENCONTRADO",
        foundAt: Date.now()
      });

      setInputMessage("CORRECTO", true);
      secretInput.value = "";
    }catch(error){
      console.error("Error actualizando found:", error);
      setInputMessage("ERROR");
    }
  }else{
    setInputMessage("INCORRECTO");
    secretInput.value = "";
  }
}

secretBtn.addEventListener("click", trySecret);

secretInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    trySecret();
  }
});

/* ANUNCIOS */
onSnapshot(anuncioRef, (snap) => {
  const d = snap.data() || {};

  if(d.active){
    overlay.classList.add("active");
    text.textContent = d.text || "";
    avatar.src = "assets/" + (d.avatar || "1.png");
  }else{
    overlay.classList.remove("active");
  }
}, (err) => {
  console.error("Error anuncio:", err);
});

/* COUNTDOWN POPUP */
function stopPopup(){
  popup.classList.remove("active");
  if(popupInterval){
    clearInterval(popupInterval);
    popupInterval = null;
  }
}

function startPopup(end){
  stopPopup();
  popup.classList.add("active");

  const tick = () => {
    const t = end - Date.now();

    if(t <= 0){
      popupTime.textContent = "00:00";
      stopPopup();
      return;
    }

    const m = Math.floor(t / 1000 / 60);
    const s = Math.floor((t / 1000) % 60);

    popupTime.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  };

  tick();
  popupInterval = setInterval(tick, 1000);
}

/* INICIO */
initTimer();

/* OPCIONAL: para usar desde consola si quieres probar popup manual
window.startPopup = startPopup;
*/
</script>

</body>
</html>
