<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Ventas</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .box { background: white; padding: 25px; border: 3px solid #000; border-radius: 15px; box-shadow: 10px 10px 0px #000; margin-bottom: 30px; }
        .order { border-bottom: 1px solid #eee; padding: 15px 0; cursor: pointer; }
        .details { display: none; padding: 15px; background: #f9f9f9; border-radius: 10px; margin-top: 5px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #000; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ADMIN DASHBOARD</h1>
        <button onclick="document.getElementById('modal-p').style.display='flex'" style="background:#000; color:#fff; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">+ NUEVO PRODUCTO</button>
    </div>

    <div class="box">
        <h3>LISTA DE COMPRAS</h3>
        <div id="ventas"></div>
    </div>

    <div id="modal-p" class="modal">
        <div style="background:white; padding:30px; border-radius:20px; width:350px; border:4px solid #000;">
            <h3>AÑADIR PRODUCTO</h3>
            <input type="text" id="tit" placeholder="Nombre del dulce">
            <input type="text" id="img" placeholder="URL de la Imagen">
            <input type="number" id="pre" placeholder="Precio ($)">
            <input type="number" id="stk" placeholder="Stock">
            <button onclick="subir()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">GUARDAR</button>
            <button onclick="document.getElementById('modal-p').style.display='none'" style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        if(localStorage.getItem('admin') !== 'true') window.location.href = 'login.html';
        
        const firebaseConfig = {
            apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
            authDomain: "gorflacos.firebaseapp.com",
            projectId: "gorflacos",
            storageBucket: "gorflacos.firebasestorage.app",
            messagingSenderId: "507648872448",
            appId: "1:507648872448:web:72dae319bcde4cea4e08e5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function subir() {
            await db.collection("productos").add({
                nombre: document.getElementById('tit').value,
                imagen: document.getElementById('img').value,
                precio: parseFloat(document.getElementById('pre').value),
                stock: parseInt(document.getElementById('stk').value)
            });
            alert("Añadido!");
            document.getElementById('modal-p').style.display='none';
        }

        db.collection("compras").orderBy("fecha", "desc").onSnapshot(snap => {
            const v = document.getElementById('ventas');
            v.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.data();
                const div = document.createElement('div');
                div.className = 'order';
                div.onclick = () => { const d = div.querySelector('.details'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; };
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <b>${c.cliente} (${c.grado})</b> <span>$${c.total}</span>
                    </div>
                    <div class="details">
                        <p><b>Pedido:</b> ${c.pedido}</p>
                        <small>${c.fecha}</small>
                    </div>
                `;
                v.appendChild(div);
            });
        });
    </script>
</body>
</html>
