<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorflacos Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  background:#000;
  color:#fff;
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:rgba(10,10,10,.95);
  border-right:1px solid rgba(255,255,255,.05);
  padding:25px;
}

.logo{
  font-size:22px;
  font-weight:900;
  margin-bottom:30px;
  background:linear-gradient(135deg,#e61919,#ff8c00);
  -webkit-background-clip:text;
  color:transparent;
}

.menu button{
  width:100%;
  margin-bottom:10px;
  padding:12px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

.menu button:hover{
  background:#222;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* CARDS */
.card{
  background:rgba(15,15,15,.8);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

/* METRICS */
.metrics{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.metric{
  padding:20px;
  border-radius:15px;
  background:linear-gradient(135deg,#e61919,#ff8c00);
  box-shadow:0 0 20px rgba(255,100,0,.3);
}

.metric h2{
  font-size:28px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

tr:hover{
  background:rgba(255,255,255,.05);
}

/* BUTTONS */
.btn{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-danger{background:#c00;color:#fff}
.btn-ok{background:#0a0;color:#fff}
.btn-main{
  background:linear-gradient(135deg,#e61919,#ff8c00);
  color:#fff;
}

/* INPUT */
input{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  background:#111;
  color:#fff;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">GORFLACOS</div>
  <div class="menu">
    <button onclick="view('dashboard')">Dashboard</button>
    <button onclick="view('inventory')">Inventario</button>
    <button onclick="view('orders')">Pedidos</button>
  </div>
</div>

<div class="main">

<div id="dashboard">

<div class="metrics">
  <div class="metric">
    <p>Ventas Totales</p>
    <h2 id="ventasTotal">0</h2>
  </div>
  <div class="metric">
    <p>Pedidos</p>
    <h2 id="pedidosTotal">0</h2>
  </div>
  <div class="metric">
    <p>Stock Bajo</p>
    <h2 id="stockBajo">0</h2>
  </div>
</div>

</div>

<div id="inventory" style="display:none">

<div class="card">
<h3>Agregar Producto</h3>
<input id="n" placeholder="Nombre">
<input id="i" placeholder="Imagen URL">
<input id="p" type="number" placeholder="Precio">
<input id="s" type="number" placeholder="Stock">
<button class="btn btn-main" onclick="crear()">Guardar</button>
</div>

<div class="card">
<h3>Inventario</h3>
<div id="inv"></div>
</div>

</div>

<div id="orders" style="display:none">

<div class="card">
<h3>Pedidos</h3>
<div id="ventas"></div>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

/* SEGURIDAD */
if(!localStorage.getItem("admin_auth")){
  window.location.href="login.html"
}

/* FIREBASE */
const firebaseConfig={
  apiKey:"AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
  authDomain:"gorflacos.firebaseapp.com",
  projectId:"gorflacos"
}

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig)
}

const db=firebase.firestore()

/* ESTADO GLOBAL */
let productos=[]
let pedidos=[]

/* VIEWS */
function view(v){
  document.getElementById("dashboard").style.display="none"
  document.getElementById("inventory").style.display="none"
  document.getElementById("orders").style.display="none"

  document.getElementById(v).style.display="block"
}

/* CREAR PRODUCTO */
async function crear(){
  const nom=n.value.trim()
  const img=i.value.trim()
  const pre=parseFloat(p.value)
  const stk=parseInt(s.value)

  if(!nom||!img||isNaN(pre)||isNaN(stk)){
    alert("Datos inválidos")
    return
  }

  await db.collection("productos").add({
    nombre:nom,
    imagen:img,
    precio:pre,
    stock:stk
  })

  n.value=i.value=p.value=s.value=""
}

/* INVENTARIO */
db.collection("productos").onSnapshot(snap=>{
  productos=[]

  inv.innerHTML=""

  snap.forEach(doc=>{
    const d=doc.data()
    productos.push({...d,id:doc.id})

    inv.innerHTML+=`
    <div class="card">
      <b>${d.nombre}</b> - $${d.precio}
      <br>

      Stock:
      <input id="stk-${doc.id}" type="number" value="${d.stock}">
      <button class="btn btn-ok" onclick="upd('${doc.id}')">OK</button>
      <button class="btn btn-danger" onclick="del('${doc.id}')">X</button>
    </div>
    `
  })

  calcular()
})

/* UPDATE */
async function upd(id){
  const val=parseInt(document.getElementById("stk-"+id).value)

  if(isNaN(val)||val<0){
    alert("Stock inválido")
    return
  }

  await db.collection("productos").doc(id).update({
    stock:val
  })
}

/* DELETE */
async function del(id){
  if(confirm("Eliminar?")){
    await db.collection("productos").doc(id).delete()
  }
}

/* PEDIDOS */
db.collection("compras").onSnapshot(snap=>{
  pedidos=[]
  ventas.innerHTML=""

  snap.forEach(doc=>{
    const d=doc.data()
    pedidos.push({...d,id:doc.id})

    ventas.innerHTML+=`
    <div class="card">
      <b>${d.cliente}</b> - $${d.total}
      <br>
      ${d.pedido || ""}
      <br><br>
      <button class="btn btn-ok" onclick="entregado('${doc.id}')">Entregado</button>
      <button class="btn btn-danger" onclick="delPedido('${doc.id}')">Eliminar</button>
    </div>
    `
  })

  calcular()
})

/* PEDIDO ACCIONES */
async function entregado(id){
  await db.collection("compras").doc(id).update({
    estado:"entregado"
  })
}

async function delPedido(id){
  if(confirm("Eliminar pedido?")){
    await db.collection("compras").doc(id).delete()
  }
}

/* METRICAS */
function calcular(){
  let total=0
  let bajo=0

  pedidos.forEach(p=> total+=Number(p.total||0))
  productos.forEach(p=>{ if(p.stock<=5) bajo++ })

  ventasTotal.innerText=total.toFixed(2)
  pedidosTotal.innerText=pedidos.length
  stockBajo.innerText=bajo
}

</script>

</body>
</html>
