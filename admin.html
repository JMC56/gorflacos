<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; }
        .box { background: white; padding: 25px; border: 3px solid #000; border-radius: 15px; box-shadow: 10px 10px 0px #000; margin-bottom: 30px; }
        input { padding: 10px; border: 2px solid #000; border-radius: 8px; margin: 5px; }
        .row { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .btn-add { background: #000; color: #fff; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .venta { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 5px solid #000; }
    </style>
</head>
<body>
    <h1>ADMIN DASHBOARD</h1>

    <div class="box">
        <h3>AÑADIR PRODUCTO</h3>
        <input type="text" id="n" placeholder="Nombre">
        <input type="text" id="i" placeholder="URL Imagen">
        <input type="number" id="p" placeholder="Precio">
        <input type="number" id="s" placeholder="Stock">
        <button class="btn-add" onclick="crear()">GUARDAR EN FIREBASE</button>
    </div>

    <div class="box">
        <h3>INVENTARIO Y STOCK</h3>
        <div id="inv"></div>
    </div>

    <div class="box">
        <h3>HISTORIAL DE COMPRAS</h3>
        <div id="ventas"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        if(!localStorage.getItem('admin_auth')) window.location.href='login.html';
        
        const firebaseConfig = {
            apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
            authDomain: "gorflacos.firebaseapp.com",
            projectId: "gorflacos",
            storageBucket: "gorflacos.firebasestorage.app",
            messagingSenderId: "507648872448",
            appId: "1:507648872448:web:72dae319bcde4cea4e08e5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function crear() {
            const nom = document.getElementById('n').value;
            const img = document.getElementById('i').value;
            const pre = parseFloat(document.getElementById('p').value);
            const stk = parseInt(document.getElementById('s').value);
            if(nom && img) {
                await db.collection("productos").add({ nombre: nom, imagen: img, precio: pre, stock: stk });
                alert("Producto añadido");
                location.reload();
            }
        }

        db.collection("productos").onSnapshot(snap => {
            const div = document.getElementById('inv');
            div.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                div.innerHTML += `
                    <div class="row">
                        <span><b>${data.nombre}</b></span>
                        <span>Stock: <input type="number" id="stk-${doc.id}" value="${data.stock}" style="width:50px"> 
                        <button onclick="upd('${doc.id}')">Actualizar</button>
                        <button onclick="del('${doc.id}')" style="color:red">Eliminar</button></span>
                    </div>
                `;
            });
        });

        async function upd(id) {
            const val = parseInt(document.getElementById('stk-'+id).value);
            await db.collection("productos").doc(id).update({ stock: val });
            alert("Stock actualizado");
        }

        async function del(id) {
            if(confirm("¿Borrar?")) await db.collection("productos").doc(id).delete();
        }

        db.collection("compras").orderBy("fecha", "desc").onSnapshot(snap => {
            const vDiv = document.getElementById('ventas');
            vDiv.innerHTML = '';
            snap.forEach(doc => {
                const v = doc.data();
                vDiv.innerHTML += `
                    <div class="venta" onclick="alert('Pedido: ${v.pedido}')">
                        <b>${v.cliente}</b> (${v.grado}) - Total: $${v.total} <br>
                        <small>${v.fecha}</small> (Click para ver productos)
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
