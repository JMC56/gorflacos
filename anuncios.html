<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Anuncios</title>
    <style>
        :root{
            --bg:#020202;
            --panel:rgba(10,10,10,.92);
            --line:rgba(255,0,60,.18);
            --text:#f5f5f5;
            --muted:#a8a8a8;
            --red:#ff003c;
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            min-height:100vh;
            font-family:"Courier New", monospace;
            color:var(--text);
            background:
                radial-gradient(circle at top, rgba(255,0,60,.08), transparent 30%),
                linear-gradient(rgba(0,0,0,.85), rgba(0,0,0,.96)),
                #000;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .panel{
            width:min(800px, 100%);
            background:var(--panel);
            border:1px solid var(--line);
            border-radius:24px;
            padding:26px;
            box-shadow:0 25px 70px rgba(0,0,0,.55), 0 0 22px rgba(255,0,60,.08);
        }

        .glitch{
            position:relative;
            display:inline-block;
            color:#fff;
            text-transform:uppercase;
            letter-spacing:2px;
            text-shadow:
                0 0 5px rgba(255,255,255,.18),
                0 0 14px rgba(255,0,60,.18);
            animation:flicker 2.3s infinite;
        }

        .glitch::before,
        .glitch::after{
            content:attr(data-text);
            position:absolute;
            inset:0;
            pointer-events:none;
        }

        .glitch::before{
            left:2px;
            color:#ff335f;
            clip-path:inset(0 0 55% 0);
            animation:glitchTop .8s infinite linear alternate-reverse;
            opacity:.7;
        }

        .glitch::after{
            left:-2px;
            color:#8f001f;
            clip-path:inset(58% 0 0 0);
            animation:glitchBottom .65s infinite linear alternate-reverse;
            opacity:.7;
        }

        @keyframes glitchTop{
            0%{ transform:translate(0,0); }
            50%{ transform:translate(-3px,-1px); }
            100%{ transform:translate(2px,1px); }
        }

        @keyframes glitchBottom{
            0%{ transform:translate(0,0); }
            50%{ transform:translate(3px,1px); }
            100%{ transform:translate(-2px,-1px); }
        }

        @keyframes flicker{
            0%,18%,22%,62%,64%,100%{ opacity:1; }
            20%,63%{ opacity:.72; }
            21%{ opacity:.45; }
        }

        h1{
            margin:0 0 10px;
            font-size:clamp(1.7rem,4vw,3rem);
        }

        p{
            margin:0 0 18px;
            color:var(--muted);
            line-height:1.6;
        }

        textarea{
            width:100%;
            min-height:220px;
            resize:vertical;
            border:1px solid var(--line);
            border-radius:18px;
            background:rgba(255,255,255,.04);
            color:#fff;
            padding:18px;
            font-family:"Courier New", monospace;
            font-size:1.05rem;
            outline:none;
        }

        .row{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            margin-top:16px;
        }

        button{
            flex:1 1 180px;
            border:1px solid var(--line);
            border-radius:14px;
            padding:14px 18px;
            cursor:pointer;
            font-weight:800;
            color:#fff;
            background:rgba(255,0,60,.08);
            font-family:"Courier New", monospace;
            transition:.2s ease;
        }

        button:hover{
            transform:translateY(-2px);
            background:rgba(255,0,60,.14);
        }

        .secondary{
            background:rgba(255,255,255,.04);
        }

        .status{
            margin-top:16px;
            padding:14px 16px;
            border:1px solid rgba(255,255,255,.08);
            border-radius:14px;
            color:#dcdcdc;
            background:rgba(255,255,255,.03);
            white-space:pre-wrap;
        }

        .live-box{
            margin-top:18px;
            padding:16px;
            border:1px solid var(--line);
            border-radius:16px;
            background:rgba(255,0,60,.04);
        }

        .live-label{
            color:#ff5b7c;
            font-size:.85rem;
            margin-bottom:8px;
            text-transform:uppercase;
            letter-spacing:2px;
        }

        .live-text{
            color:#fff;
            font-size:1.1rem;
            word-break:break-word;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1 class="glitch" data-text="CONTROL DE ANUNCIOS">CONTROL DE ANUNCIOS</h1>
        <p>Escribe el mensaje global. Al publicarlo, aparecerá en todas las pantallas en tiempo real.</p>

        <textarea id="announcementInput" placeholder="Escribe aquí el anuncio global..."></textarea>

        <div class="row">
            <button onclick="publicarAnuncio()">PUBLICAR AHORA</button>
            <button class="secondary" onclick="quitarAnuncio()">QUITAR ANUNCIO</button>
        </div>

        <div class="status" id="statusBox">Esperando acción...</div>

        <div class="live-box">
            <div class="live-label">Estado actual transmitido</div>
            <div class="live-text" id="liveText">Sin anuncio activo</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
            authDomain: "gorflacos.firebaseapp.com",
            projectId: "gorflacos",
            storageBucket: "gorflacos.firebasestorage.app",
            messagingSenderId: "507648872448",
            appId: "1:507648872448:web:72dae319bcde4cea4e08e5"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const announcementInput = document.getElementById("announcementInput");
        const statusBox = document.getElementById("statusBox");
        const liveText = document.getElementById("liveText");

        async function publicarAnuncio() {
            const text = announcementInput.value.trim();

            if (!text) {
                statusBox.textContent = "Escribe un anuncio antes de publicar.";
                return;
            }

            try {
                await db.collection("system").doc("globalAnnouncement").set({
                    active: true,
                    text: text,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                statusBox.textContent = "Anuncio publicado correctamente en tiempo real.";
            } catch (error) {
                console.error(error);
                statusBox.textContent = "Error al publicar el anuncio.";
            }
        }

        async function quitarAnuncio() {
            try {
                await db.collection("system").doc("globalAnnouncement").set({
                    active: false,
                    text: "",
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                statusBox.textContent = "Anuncio quitado correctamente.";
            } catch (error) {
                console.error(error);
                statusBox.textContent = "Error al quitar el anuncio.";
            }
        }

        db.collection("system").doc("globalAnnouncement").onSnapshot((doc) => {
            if (!doc.exists) {
                liveText.textContent = "Sin anuncio activo";
                return;
            }

            const data = doc.data() || {};
            if (data.active && data.text) {
                liveText.textContent = data.text;
                announcementInput.value = data.text;
            } else {
                liveText.textContent = "Sin anuncio activo";
            }
        }, (error) => {
            console.error(error);
            statusBox.textContent = "Error al leer el estado actual.";
        });

        window.publicarAnuncio = publicarAnuncio;
        window.quitarAnuncio = quitarAnuncio;
    </script>
</body>
</html>
