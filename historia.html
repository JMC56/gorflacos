<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>System Access</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:Consolas, monospace;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

/* FLASH */
.flash{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  z-index:9999;
}

/* GLITCH */
.glitch{
  animation:glitch 0.15s infinite;
}

@keyframes glitch{
  0%{transform:translate(0,0);}
  20%{transform:translate(-6px,4px);}
  40%{transform:translate(6px,-4px);}
  60%{transform:translate(-3px,-2px);}
  80%{transform:translate(3px,2px);}
  100%{transform:translate(0,0);}
}

/* CONTENEDOR */
.box{
  width:90%;
  max-width:900px;
  z-index:2;
}

/* TITULO */
.title{
  font-size:40px;
  color:red;
  margin-bottom:20px;
}

/* TEXTO */
#text{
  white-space:pre-wrap;
  line-height:1.6;
  font-size:16px;
}

/* CURSOR */
.cursor{
  display:inline-block;
  width:10px;
  background:red;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

/* VIDEO (CAMARA) */
video{
  position:fixed;
  right:10px;
  bottom:10px;
  width:180px;
  opacity:.4;
  z-index:5;
  border:1px solid red;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="box">
  <div class="title">ACCESS LOGGED</div>
  <div id="text"></div>
</div>

<video id="cam" autoplay muted></video>

<script>
const msg = `No deberías haber entrado.

Tu acceso ha sido registrado.

No es solo esta página.

Tu sistema ya respondió.

No hiciste nada… pero abriste algo.

Estoy viendo tu actividad.

Tu cursor.
Tu ritmo.

No es necesario que hagas nada.

Ya es suficiente.

Esto no empezó contigo.

Pero puede terminar contigo.`;

/* TEXTO */
const el = document.getElementById("text");

function type(){
  let i = 0;

  const interval = setInterval(()=>{
    el.innerHTML = msg.slice(0,i) + '<span class="cursor"></span>';
    i++;

    if(i > msg.length){
      clearInterval(interval);
      el.innerHTML = msg;
    }
  },20);
}

/* FLASH */
function flash(){
  const f = document.getElementById("flash");
  f.style.opacity = 1;
  setTimeout(()=>f.style.opacity = 0, 80);
}

/* GLITCH RANDOM */
setInterval(()=>{
  document.body.classList.add("glitch");
  setTimeout(()=>document.body.classList.remove("glitch"),200);
},3000);

/* VOZ */
function voice(){
  const speech = new SpeechSynthesisUtterance(msg);
  speech.rate = 0.85;
  speech.pitch = 0.5;
  speech.volume = 1;
  speech.lang = "es-ES";
  speechSynthesis.speak(speech);
}

/* CAMARA REAL */
async function cam(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    document.getElementById("cam").srcObject = stream;
  }catch(e){
    console.log("permiso denegado");
  }
}

/* EVENTOS */
setTimeout(()=>{
  flash();
  type();
  voice();
  cam();
},1000);

/* FLASH RANDOM */
setInterval(()=>{
  flash();
},5000);

</script>

</body>
</html>
