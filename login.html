<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Admin</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; }
        .login-box { background: white; padding: 40px; border: 4px solid #000; border-radius: 20px; box-shadow: 15px 15px 0px #000; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #000; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <input type="text" id="u" placeholder="Usuario">
        <input type="password" id="p" placeholder="Contraseña">
        <button onclick="login()">ENTRAR</button>
    </div>
    <script>
        async function login() {
            const res = await fetch('gallopinto.json');
            const data = await res.json();
            const user = data.usuarios.find(x => x.username === document.getElementById('u').value && x.password === document.getElementById('p').value);
            if(user && user.role === 'admin') {
                localStorage.setItem('admin', 'true');
                window.location.href = 'admin.html';
            } else {
                alert("Incorrecto");
            }
        }
    </script>
</body>
</html>
