<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --red:#e61919;
  --orange:#ff8c00;
}

/* ===== FONDO STREAMNIC ===== */
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(230,25,25,.15), transparent 30%),
    radial-gradient(circle at bottom right, rgba(255,140,0,.12), transparent 30%),
    #000;
  overflow:hidden;
}

/* ===== ANIMACION ===== */
@keyframes revealUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ===== LOGIN BOX ===== */
.login-box{
  width:340px;
  padding:40px;
  border-radius:32px;

  background:rgba(10,10,10,0.9);
  backdrop-filter:blur(16px);

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:
    0 30px 80px rgba(0,0,0,.8),
    inset 0 0 0 1px rgba(255,255,255,0.04);

  text-align:center;

  animation:revealUp .6s ease;
}

/* ===== TITULO ===== */
h2{
  margin-bottom:25px;
  font-weight:900;
  font-style:italic;
  letter-spacing:1px;
  color:white;
}

.gradient-text{
  background:linear-gradient(135deg,var(--red),var(--orange));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ===== INPUTS ===== */
input{
  width:100%;
  padding:14px;
  margin-bottom:15px;

  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);

  background:#050505;
  color:white;

  font-size:1rem;

  transition:.25s;
}

input::placeholder{
  color:#666;
}

input:focus{
  outline:none;
  border-color:rgba(255,140,0,.6);
  box-shadow:0 0 0 2px rgba(255,140,0,.15);
}

/* ===== BOTON ===== */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;

  font-weight:900;
  color:white;

  background:linear-gradient(135deg,var(--red),var(--orange));

  cursor:pointer;
  transition:.25s;
}

button:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:
    0 0 20px rgba(255,140,0,.3),
    0 10px 30px rgba(230,25,25,.3);
}

button:active{
  transform:scale(.95);
}

/* ===== MENSAJE ===== */
.msg{
  margin-top:10px;
  font-size:.9rem;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>ADMIN <span class="gradient-text">LOGIN</span></h2>

    <input type="text" id="u" placeholder="Usuario">
    <input type="password" id="p" placeholder="Contraseña">

    <button onclick="login()">ENTRAR</button>

    <div id="msg" class="msg"></div>
</div>

<script>
async function login() {
    const userInput = document.getElementById('u').value.trim();
    const passInput = document.getElementById('p').value.trim();
    const msg = document.getElementById('msg');

    if (!userInput || !passInput) {
        msg.style.color = "red";
        msg.textContent = "Completa todos los campos";
        return;
    }

    try {
        const res = await fetch('gallopinto.json');
        const data = await res.json();

        const users = data.usuarios || data.users || [];

        const user = users.find(x => 
            x.username === userInput && 
            x.password === passInput
        );

        if (!user) {
            msg.style.color = "red";
            msg.textContent = "Credenciales incorrectas";
            return;
        }

        if (user.role !== 'admin') {
            msg.style.color = "red";
            msg.textContent = "No tienes acceso";
            return;
        }

        localStorage.setItem('admin_auth', 'true');
        localStorage.setItem('admin_user', user.username);

        msg.style.color = "lime";
        msg.textContent = "Acceso concedido...";

        setTimeout(() => {
            window.location.href = 'admin.html';
        }, 500);

    } catch (e) {
        console.error(e);
        msg.style.color = "red";
        msg.textContent = "Error cargando usuarios";
    }
}

document.getElementById('p').addEventListener("keydown", e => {
    if (e.key === "Enter") login();
});
document.getElementById('u').addEventListener("keydown", e => {
    if (e.key === "Enter") login();
});
</script>

</body>
</html>
