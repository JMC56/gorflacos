<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Anuncios</title>
    <style>
        :root{
            --bg:#020202;
            --panel:rgba(10,10,10,.92);
            --line:rgba(255,0,60,.18);
            --line-strong:rgba(255,0,60,.35);
            --text:#f5f5f5;
            --muted:#a8a8a8;
            --red:#ff003c;
            --red-soft:#ff335f;
            --dark-red:#8f001f;
            --shadow:0 25px 70px rgba(0,0,0,.55), 0 0 22px rgba(255,0,60,.08);
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            min-height:100vh;
            font-family:"Courier New", monospace;
            color:var(--text);
            background:
                radial-gradient(circle at top, rgba(255,0,60,.08), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255,0,60,.04), transparent 25%),
                linear-gradient(rgba(0,0,0,.85), rgba(0,0,0,.96)),
                #000;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .panel{
            width:min(950px, 100%);
            background:var(--panel);
            border:1px solid var(--line);
            border-radius:24px;
            padding:28px;
            box-shadow:var(--shadow);
            position:relative;
            overflow:hidden;
        }

        .panel::before{
            content:"";
            position:absolute;
            inset:0;
            pointer-events:none;
            background:
                linear-gradient(90deg, transparent, rgba(255,0,60,.04), transparent);
            transform:translateX(-100%);
            animation:sweep 5s linear infinite;
        }

        @keyframes sweep{
            to{ transform:translateX(100%); }
        }

        .glitch{
            position:relative;
            display:inline-block;
            color:#fff;
            text-transform:uppercase;
            letter-spacing:2px;
            text-shadow:
                0 0 5px rgba(255,255,255,.18),
                0 0 14px rgba(255,0,60,.18);
            animation:flicker 2.3s infinite;
        }

        .glitch::before,
        .glitch::after{
            content:attr(data-text);
            position:absolute;
            inset:0;
            pointer-events:none;
        }

        .glitch::before{
            left:2px;
            color:var(--red-soft);
            clip-path:inset(0 0 55% 0);
            animation:glitchTop .8s infinite linear alternate-reverse;
            opacity:.7;
        }

        .glitch::after{
            left:-2px;
            color:var(--dark-red);
            clip-path:inset(58% 0 0 0);
            animation:glitchBottom .65s infinite linear alternate-reverse;
            opacity:.7;
        }

        @keyframes glitchTop{
            0%{ transform:translate(0,0); }
            50%{ transform:translate(-3px,-1px); }
            100%{ transform:translate(2px,1px); }
        }

        @keyframes glitchBottom{
            0%{ transform:translate(0,0); }
            50%{ transform:translate(3px,1px); }
            100%{ transform:translate(-2px,-1px); }
        }

        @keyframes flicker{
            0%,18%,22%,62%,64%,100%{ opacity:1; }
            20%,63%{ opacity:.72; }
            21%{ opacity:.45; }
        }

        h1{ margin:0 0 10px; font-size:clamp(1.7rem,4vw,3rem); }

        p{ margin:0 0 18px; color:var(--muted); line-height:1.6; }

        .grid{
            display:grid;
            grid-template-columns:1.4fr .9fr;
            gap:18px;
            align-items:start;
        }

        .box{
            border:1px solid var(--line);
            border-radius:18px;
            background:rgba(255,255,255,.03);
            padding:16px;
        }

        .box + .box{ margin-top:16px; }

        .box-title{
            color:#ff5b7c;
            font-size:.86rem;
            text-transform:uppercase;
            letter-spacing:2px;
            margin-bottom:10px;
            font-weight:700;
        }

        textarea, select{
            width:100%;
            border:1px solid var(--line);
            border-radius:18px;
            background:rgba(255,255,255,.04);
            color:#fff;
            padding:18px;
            font-family:"Courier New", monospace;
            font-size:1.02rem;
            outline:none;
            transition:.2s ease;
        }

        textarea{ min-height:220px; resize:vertical; }

        textarea:focus, select:focus{
            border-color:var(--line-strong);
            box-shadow:0 0 0 3px rgba(255,0,60,.08);
        }

        .row{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            margin-top:16px;
        }

        button{
            flex:1 1 180px;
            border:1px solid var(--line);
            border-radius:14px;
            padding:14px 18px;
            cursor:pointer;
            font-weight:800;
            color:#fff;
            background:rgba(255,0,60,.08);
            font-family:"Courier New", monospace;
            transition:.2s ease;
            text-transform:uppercase;
        }

        button:hover{
            transform:translateY(-2px);
            background:rgba(255,0,60,.14);
        }

        .secondary{ background:rgba(255,255,255,.04); }

        .status{
            margin-top:16px;
            padding:14px;
            border:1px solid rgba(255,255,255,.08);
            border-radius:14px;
            background:rgba(255,255,255,.03);
        }
    </style>
</head>

<body>

<div class="panel">

<h1 class="glitch" data-text="CONTROL GLOBAL">CONTROL GLOBAL</h1>

<p>
Controla el anuncio global y el sistema de alarmas en tiempo real.
Puedes enviar mensajes o activar una alerta global visible en todo el sistema.
</p>

<div class="grid">

<div>
<div class="box">
<div class="box-title">Mensaje del anuncio</div>

<textarea id="announcementInput"></textarea>

<div class="row">
<button onclick="publicarAnuncio()">Publicar</button>
<button class="secondary" onclick="quitarAnuncio()">Quitar</button>
</div>

<div class="row">
<button onclick="encenderAlarma()">🚨 Encender alarma</button>
<button class="secondary" onclick="apagarAlarma()">Apagar alarma</button>
</div>

<div id="statusBox" class="status">Esperando acción...</div>

</div>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
      authDomain: "gorflacos.firebaseapp.com",
      projectId: "gorflacos",
      storageBucket: "gorflacos.firebasestorage.app",
      messagingSenderId: "507648872448",
      appId: "1:507648872448:web:72dae319bcde4cea4e08e5"
    };

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const rtdb = firebase.database();

function publicarAnuncio(){
    const text = document.getElementById("announcementInput").value;

    db.collection("system").doc("globalAnnouncement").set({
        active:true,
        text:text
    });

    estado("Anuncio publicado");
}

function quitarAnuncio(){
    db.collection("system").doc("globalAnnouncement").set({
        active:false
    });

    estado("Anuncio eliminado");
}

function encenderAlarma(){
    rtdb.ref("alarma").set({ activa:true });
    estado("🚨 Alarma activada");
}

function apagarAlarma(){
    rtdb.ref("alarma").set({ activa:false });
    estado("Alarma apagada");
}

function estado(txt){
    document.getElementById("statusBox").textContent = txt;
}
</script>

</body>
</html>
