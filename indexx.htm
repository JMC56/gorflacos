<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorflacos Shop</title>
    <style>
        :root {
            --black: #000;
            --white: #fff;
            --gray: #f3f3f3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: #fafafa;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 2px solid #000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .login-link {
            text-decoration: none;
            color: #000;
            font-weight: bold;
            border: 2px solid #000;
            padding: 8px 14px;
            border-radius: 10px;
            background: #fff;
            transition: 0.2s;
        }

        .login-link:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 #000;
        }

        .cart-toggle {
            cursor: pointer;
            font-weight: bold;
            border: 2px solid #000;
            padding: 8px 14px;
            border-radius: 10px;
            background: #fff;
        }

        #store {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px;
        }

        .card {
            background: white;
            border: 2px solid #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 8px 8px 0px #000;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px #000;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 2px solid #000;
            background: #eee;
        }

        .card-info {
            padding: 15px;
            text-align: center;
        }

        .card-info h3 {
            margin: 0 0 10px;
            font-size: 1.1rem;
        }

        .card-info p {
            margin: 6px 0;
        }

        .no-stock {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }

        .lock {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.68);
            font-size: 2rem;
            font-weight: 900;
            color: #000;
            text-align: center;
            padding: 20px;
        }

        #cart-panel {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 320px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background: white;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 10px 10px 0px #000;
            display: none;
            z-index: 500;
        }

        #cart-list .item {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        #cart-list .item:last-child {
            border-bottom: none;
        }

        .qty-box {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .qty-btn,
        .remove-btn {
            border: 2px solid #000;
            background: #fff;
            border-radius: 8px;
            padding: 4px 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .remove-btn {
            color: #c00;
        }

        .cart-total {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .m-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #000;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #000;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn.light {
            background: #fff;
            color: #000;
            border: 2px solid #000;
        }

        .empty-msg {
            padding: 50px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .small {
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <a href="login.html" class="login-link">LOGIN</a>
        <div class="cart-toggle" onclick="toggleCart()">🛒 CARRITO (<span id="count">0</span>)</div>
    </header>

    <div id="store"></div>

    <div id="cart-panel">
        <h3>TU PEDIDO</h3>
        <div id="cart-list"></div>
        <div class="cart-total">TOTAL: $<span id="cart-total">0</span></div>
        <hr>
        <button class="btn" onclick="openModalCompra()">COMPRAR</button>
        <button class="btn light" onclick="toggleCart(false)">CERRAR</button>
    </div>

    <div id="modal-buy" class="modal">
        <div class="m-box">
            <h2 id="m-title">FINALIZAR</h2>

            <div id="m-form">
                <input type="text" id="user-n" placeholder="Tu Nombre">
                <input type="text" id="user-g" placeholder="Tu Grado">
                <button class="btn" onclick="confirmarCompra()">CONFIRMAR</button>
                <button class="btn light" onclick="cerrarModalCompra()">CANCELAR</button>
            </div>

            <div id="m-thanks" style="display:none;">
                <p><strong>¡Gracias por tu compra!</strong></p>
                <p>Se te entregará lo más pronto posible.</p>
                <p>No olvides llevar el dinero exacto de tu pedido.</p>
                <button class="btn" onclick="location.reload()">CERRAR</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB685cJZl1HCK6He3sRdUNDu_oPOyO6dOw",
            authDomain: "gorflacos.firebaseapp.com",
            projectId: "gorflacos",
            storageBucket: "gorflacos.firebasestorage.app",
            messagingSenderId: "507648872448",
            appId: "1:507648872448:web:72dae319bcde4cea4e08e5"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();

        let cart = [];
        const store = document.getElementById("store");
        const cartList = document.getElementById("cart-list");
        const count = document.getElementById("count");
        const cartTotal = document.getElementById("cart-total");

        function escapeHtml(text) {
            if (text === null || text === undefined) return "";
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function toggleCart(force) {
            const panel = document.getElementById("cart-panel");
            if (typeof force === "boolean") {
                panel.style.display = force ? "block" : "none";
            } else {
                panel.style.display = panel.style.display === "block" ? "none" : "block";
            }
        }

        function renderStore(snapshot) {
            store.innerHTML = "";

            if (snapshot.empty) {
                store.innerHTML = `<div class="empty-msg">No hay productos todavía.</div>`;
                return;
            }

            snapshot.forEach(doc => {
                const p = doc.data();
                const nombre = p.nombre || "Sin nombre";
                const imagen = p.imagen || "";
                const precio = Number(p.precio || 0);
                const stock = Number(p.stock || 0);
                const agotado = stock <= 0;

                const card = document.createElement("div");
                card.className = `card ${agotado ? "no-stock" : ""}`;

                card.innerHTML = `
                    <img src="${escapeHtml(imagen)}" alt="${escapeHtml(nombre)}">
                    <div class="card-info">
                        <h3>${escapeHtml(nombre)}</h3>
                        <p><strong>$${precio}</strong></p>
                        <p class="small">Stock: ${stock}</p>
                    </div>
                    ${agotado ? '<div class="lock">⛔ NO DISPONIBLE</div>' : ''}
                `;

                if (!agotado) {
                    card.addEventListener("click", () => {
                        agregarAlCarrito(doc.id, nombre, precio, stock);
                    });
                }

                store.appendChild(card);
            });
        }

        function agregarAlCarrito(id, nombre, precio, stock) {
            const item = cart.find(x => x.id === id);

            if (item) {
                if (item.qty < item.stock) {
                    item.qty++;
                } else {
                    alert("Sin más stock disponible");
                }
            } else {
                cart.push({
                    id,
                    nombre,
                    precio,
                    qty: 1,
                    stock
                });
            }

            renderCart();
        }

        function aumentarCantidad(index) {
            const item = cart[index];
            if (!item) return;

            if (item.qty < item.stock) {
                item.qty++;
                renderCart();
            } else {
                alert("No hay más stock disponible");
            }
        }

        function disminuirCantidad(index) {
            const item = cart[index];
            if (!item) return;

            item.qty--;

            if (item.qty <= 0) {
                cart.splice(index, 1);
            }

            renderCart();
        }

        function eliminarDelCarrito(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function renderCart() {
            cartList.innerHTML = "";

            if (cart.length === 0) {
                cartList.innerHTML = `<p>Tu carrito está vacío.</p>`;
                count.textContent = "0";
                cartTotal.textContent = "0";
                return;
            }

            let total = 0;
            let cantidadTotal = 0;

            cart.forEach((item, index) => {
                const subtotal = item.precio * item.qty;
                total += subtotal;
                cantidadTotal += item.qty;

                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `
                    <strong>${escapeHtml(item.nombre)}</strong><br>
                    <span class="small">Precio: $${item.precio}</span><br>
                    <span class="small">Subtotal: $${subtotal}</span>
                    <div class="qty-box">
                        <button class="qty-btn" onclick="disminuirCantidad(${index})">-</button>
                        <span><strong>${item.qty}</strong></span>
                        <button class="qty-btn" onclick="aumentarCantidad(${index})">+</button>
                        <button class="remove-btn" onclick="eliminarDelCarrito(${index})">x</button>
                    </div>
                `;
                cartList.appendChild(div);
            });

            count.textContent = cantidadTotal;
            cartTotal.textContent = total;
        }

        function openModalCompra() {
            if (cart.length === 0) {
                alert("No hay productos en el carrito");
                return;
            }
            document.getElementById("modal-buy").style.display = "flex";
        }

        function cerrarModalCompra() {
            document.getElementById("modal-buy").style.display = "none";
        }

        async function confirmarCompra() {
            const nombreCliente = document.getElementById("user-n").value.trim();
            const gradoCliente = document.getElementById("user-g").value.trim();

            if (!nombreCliente || !gradoCliente) {
                alert("Completa los datos");
                return;
            }

            try {
                const total = cart.reduce((acc, item) => acc + (item.precio * item.qty), 0);
                const pedidoTexto = cart.map(item => `${item.nombre} (x${item.qty})`).join(", ");

                const batch = db.batch();
                const compraRef = db.collection("compras").doc();

                batch.set(compraRef, {
                    cliente: nombreCliente,
                    grado: gradoCliente,
                    pedido: pedidoTexto,
                    total: total,
                    items: cart.map(item => ({
                        id: item.id,
                        nombre: item.nombre,
                        precio: item.precio,
                        qty: item.qty
                    })),
                    fecha: firebase.firestore.Timestamp.now()
                });

                cart.forEach(item => {
                    const productoRef = db.collection("productos").doc(item.id);
                    batch.update(productoRef, {
                        stock: firebase.firestore.FieldValue.increment(-item.qty)
                    });
                });

                await batch.commit();

                document.getElementById("m-form").style.display = "none";
                document.getElementById("m-thanks").style.display = "block";
            } catch (error) {
                console.error("Error al confirmar compra:", error);
                alert("No se pudo completar la compra");
            }
        }

        db.collection("productos").onSnapshot(
            (snapshot) => {
                renderStore(snapshot);
            },
            (error) => {
                console.error("Error al leer productos:", error);
                store.innerHTML = `<div class="empty-msg">No se pudieron cargar los productos.</div>`;
            }
        );

        window.toggleCart = toggleCart;
        window.openModalCompra = openModalCompra;
        window.cerrarModalCompra = cerrarModalCompra;
        window.confirmarCompra = confirmarCompra;
        window.aumentarCantidad = aumentarCantidad;
        window.disminuirCantidad = disminuirCantidad;
        window.eliminarDelCarrito = eliminarDelCarrito;
    </script>
</body>
</html>
