<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN ENCUESTAS PRO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  background:#05070a;
  color:#24ff8a;
  font-family:'Press Start 2P', monospace;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.panel{
  border:2px solid #24ff8a;
  padding:20px;
  margin-bottom:20px;
  background:#0a1016;
}

input,textarea,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:black;
  color:#24ff8a;
  border:2px solid #24ff8a;
  font-family:inherit;
}

button{
  cursor:pointer;
}

.option{
  display:flex;
  gap:10px;
}

.option input{
  flex:1;
}
</style>
</head>

<body>

<div class="container">

<h2>CREAR ENCUESTA</h2>

<textarea id="question" placeholder="Pregunta"></textarea>

<div id="options"></div>

<button onclick="addOption()">+ OPCION</button>

<label>
<input type="checkbox" id="allowText">
 PERMITIR RESPUESTA ESCRITA
</label>

<button onclick="publish()">PUBLICAR</button>

<hr>

<h2>RESPUESTAS EN VIVO</h2>
<div id="responses"></div>

<hr>

<h2>ANUNCIO GLOBAL</h2>

<textarea id="msg"></textarea>

<select id="avatar">
<option value="assets/1.png">Avatar 1</option>
<option value="assets/2.png">Avatar 2</option>
<option value="assets/3.png">Avatar 3</option>
<option value="assets/4.png">Avatar 4</option>
</select>

<button onclick="send()">ENVIAR</button>
<button onclick="remove()">QUITAR</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyB685...",
authDomain: "gorflacos.firebaseapp.com",
projectId: "gorflacos"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const optionsDiv = document.getElementById("options");

function addOption(){
  const div = document.createElement("div");
  div.className = "option";

  div.innerHTML = `
    <input placeholder="Opcion">
    <button onclick="this.parentNode.remove()">X</button>
  `;

  optionsDiv.appendChild(div);
}

addOption();
addOption();

async function publish(){

  const q = document.getElementById("question").value;
  const allowText = document.getElementById("allowText").checked;

  const opts = [...document.querySelectorAll(".option input")]
    .map(i=>i.value)
    .filter(Boolean);

  if(!q || opts.length < 2) return;

  const id = "survey_"+Date.now();

  await db.collection("surveys").doc(id).set({
    question:q,
    options: opts.map(t=>({text:t,votes:0})),
    allowTextAnswer: allowText
  });

  await db.collection("system").doc("activeSurvey").set({
    surveyId:id
  });

  listenResponses(id);
}

function listenResponses(id){

  db.collection("surveys")
    .doc(id)
    .collection("responses")
    .onSnapshot(snap=>{

      const box = document.getElementById("responses");
      let html = "";

      snap.forEach(doc=>{
        html += `<div style="border:1px solid red;padding:10px;margin:5px;">${doc.data().text}</div>`;
      });

      box.innerHTML = html || "SIN RESPUESTAS";
    });
}

function send(){
  const text = document.getElementById("msg").value;
  const avatar = document.getElementById("avatar").value;

  db.collection("system").doc("globalAnnouncement").set({
    active:true,
    text:text,
    avatar:avatar,
    avatarEnabled:true
  });
}

function remove(){
  db.collection("system").doc("globalAnnouncement").set({
    active:false
  });
}
</script>

</body>
</html>
