<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ADMIN ENCUESTAS</title>

<style>
body{
  background:#05070a;
  color:#24ff8a;
  font-family:monospace;
  padding:20px;
}

h1{
  color:white;
}

input,textarea,select{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:black;
  color:#24ff8a;
  border:1px solid #24ff8a;
}

button{
  padding:10px;
  margin-top:5px;
  background:black;
  color:#24ff8a;
  border:1px solid #24ff8a;
  cursor:pointer;
}

.option{
  display:flex;
  gap:10px;
}

.option input{
  flex:1;
}

.panel{
  border:1px solid #24ff8a;
  padding:15px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>ADMIN ENCUESTAS</h1>

<div class="panel">

<h3>PREGUNTA</h3>
<textarea id="question"></textarea>

<h3>OPCIONES</h3>
<div id="options"></div>

<button onclick="addOption()">AGREGAR OPCION</button>

<br><br>

<label>
<input type="checkbox" id="allowText">
 Permitir respuesta escrita
</label>

<br><br>

<button onclick="publish()">PUBLICAR ENCUESTA</button>

</div>

<div class="panel">

<h3>RESPUESTAS EN VIVO</h3>
<div id="responses">SIN RESPUESTAS</div>

</div>

<div class="panel">

<h3>ANUNCIO GLOBAL</h3>

<textarea id="msg"></textarea>

<select id="avatar">
<option value="assets/1.png">1.png</option>
<option value="assets/2.png">2.png</option>
<option value="assets/3.png">3.png</option>
<option value="assets/4.png">4.png</option>
</select>

<button onclick="send()">ENVIAR</button>
<button onclick="remove()">QUITAR</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB685...",
  authDomain: "gorflacos.firebaseapp.com",
  projectId: "gorflacos"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const optionsDiv = document.getElementById("options");

function addOption(value=""){
  const div = document.createElement("div");
  div.className="option";

  const input = document.createElement("input");
  input.value = value;
  input.placeholder="Opcion";

  const btn = document.createElement("button");
  btn.textContent="X";

  btn.onclick = ()=>{
    div.remove();
  };

  div.appendChild(input);
  div.appendChild(btn);
  optionsDiv.appendChild(div);
}

addOption();
addOption();

async function publish(){

  const q = document.getElementById("question").value.trim();
  const allowText = document.getElementById("allowText").checked;

  const opts = [...document.querySelectorAll(".option input")]
    .map(i=>i.value.trim())
    .filter(v=>v);

  if(!q || opts.length < 2){
    alert("ERROR");
    return;
  }

  const id = "survey_"+Date.now();

  await db.collection("surveys").doc(id).set({
    question:q,
    options: opts.map(t=>({text:t,votes:0})),
    totalVotes:0,
    allowTextAnswer: allowText
  });

  await db.collection("system").doc("activeSurvey").set({
    surveyId:id
  });

  listenResponses(id);

  alert("ENCUESTA PUBLICADA");
}

function listenResponses(id){

  db.collection("surveys")
    .doc(id)
    .collection("responses")
    .onSnapshot(snap=>{

      let html="";

      snap.forEach(doc=>{
        html += `<div style="border:1px solid red;margin:5px;padding:10px;">${doc.data().text}</div>`;
      });

      document.getElementById("responses").innerHTML = html || "SIN RESPUESTAS";

    });
}

function send(){

  const text = document.getElementById("msg").value;
  const avatar = document.getElementById("avatar").value;

  db.collection("system").doc("globalAnnouncement").set({
    active:true,
    text:text,
    avatar:avatar,
    avatarEnabled:true
  });
}

function remove(){

  db.collection("system").doc("globalAnnouncement").set({
    active:false
  });
}
</script>

</body>
</html>
